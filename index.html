<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            min-width: 1120px;
        }

        .plan-shell {
            --sidebar-width: 248px;
            height: 100vh;
            background: #f1f3f8;
        }

        .sidebar-header {
            padding-right: 12px;
        }

        .brand {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .plan-badge {
            flex: 0 0 auto;
            padding: 2px 6px;
            border-radius: 4px;
            background: #fef4e5;
            color: #ff8300;
            font-size: 12px;
            font-weight: 500;
        }

        .top-header {
            height: 60px;
            padding: 0 28px;
            background: rgba(255, 255, 255, 0.42);
            border-bottom: 1px solid rgba(228, 231, 237, 0.54);
        }

        .header-left {
            margin-right: auto;
            color: #606266;
            font-size: 13px;
        }

        .header-right {
            gap: 14px;
        }

        .language-toggle {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            height: 34px;
            padding: 0 10px;
            border: 1px solid #dcdfe6;
            border-radius: 17px;
            background: #fff;
            color: #303133;
            font: inherit;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(48, 49, 51, 0.06);
            transition: border-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
        }

        .language-toggle i {
            color: #ff8300;
            font-size: 18px;
        }

        .language-toggle:hover,
        .language-toggle:focus-visible {
            border-color: rgba(255, 131, 0, 0.55);
            color: #ff8300;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 131, 0, 0.1);
        }

        .dashboard {
            padding: 30px 34px 34px;
        }

        .page-title {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 22px;
        }

        .page-title h2 {
            font-size: 22px;
            font-weight: 600;
        }

        .source-pill {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 30px;
            padding: 0 10px;
            border: 1px solid #e4e7ed;
            border-radius: 15px;
            background: #fff;
            color: #606266;
            font-size: 12px;
        }

        .source-pill i {
            color: #67c23a;
            font-size: 16px;
        }

        .overview-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
        }

        .overview-card {
            min-height: 116px;
            padding: 18px 20px;
            border: 1px solid #ebeef5;
            border-radius: 6px;
            background: #fff;
            box-shadow: 0 1px 3px rgba(48, 49, 51, 0.03);
        }

        .overview-card:nth-child(1) { border-top: 3px solid #409eff; }
        .overview-card:nth-child(2) { border-top: 3px solid #67c23a; }
        .overview-card:nth-child(3) { border-top: 3px solid #ff8300; }
        .overview-card:nth-child(4) { border-top: 3px solid #7c5cff; }

        .overview-card .eyebrow {
            margin-bottom: 10px;
            color: #909399;
            font-size: 12px;
        }

        .overview-card strong {
            display: block;
            color: #303133;
            font-size: 26px;
            font-weight: 600;
            line-height: 1.1;
        }

        .overview-card span {
            display: block;
            margin-top: 8px;
            color: #606266;
            font-size: 13px;
            line-height: 1.45;
        }

        .content-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
            gap: 18px;
        }

        .panel {
            background: #fff;
            border: 1px solid #ebeef5;
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 1px 3px rgba(48, 49, 51, 0.03);
        }

        .panel-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .panel-title h3 {
            color: #303133;
            font-size: 15px;
            font-weight: 600;
        }

        .panel-title i {
            color: #ff8300;
            font-size: 18px;
        }

        .path-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px 12px;
            list-style: none;
        }

        .path-list li {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 34px;
            padding: 8px 10px;
            color: #606266;
            background: #fafafa;
            border: 1px solid #f0f2f5;
            border-radius: 4px;
            font-size: 13px;
        }

        .path-list i {
            color: #ff8300;
            font-size: 16px;
        }

        .coverage-list {
            display: grid;
            gap: 12px;
        }

        .coverage-row {
            display: grid;
            grid-template-columns: 116px 1fr auto;
            align-items: center;
            gap: 10px;
            color: #606266;
            font-size: 13px;
        }

        .coverage-track {
            height: 8px;
            overflow: hidden;
            border-radius: 4px;
            background: #edf0f5;
        }

        .coverage-bar {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #409eff 0%, #67c23a 100%);
        }

        .hint-text {
            margin-top: 14px;
            color: #909399;
            font-size: 12px;
            line-height: 1.6;
        }

        .menu-empty {
            padding: 24px 16px;
            color: #909399;
            font-size: 13px;
        }

        .no-results {
            padding: 18px 16px;
            color: #909399;
            font-size: 13px;
        }

        .level-1 > .menu-li > .menu-item {
            height: var(--item-height);
            padding-left: 16px;
            padding-right: 10px;
            color: #303133;
            font-size: 14px;
            font-weight: 400;
        }

        .level-1 > .menu-li > .menu-item i:first-child {
            font-size: 18px;
            margin-right: 12px;
            color: #909399;
        }

        .level-1 > .menu-li > .menu-item .chevron {
            font-size: 12px;
            color: #c0c4cc;
        }

        .level-2 > .menu-li > .menu-item {
            padding-right: 8px;
        }

        .level-1 .level-2 > .menu-li > .menu-item {
            padding-left: 46px;
            font-size: 13px;
        }

        .level-1 .level-3 > .menu-li > .menu-item {
            padding-left: 62px;
        }

        .level-1 .level-4 > .menu-li > .menu-item {
            padding-left: 78px;
        }

        .level-3 > .menu-li > .menu-item,
        .level-4 > .menu-li > .menu-item {
            min-width: 0;
        }

        html[data-lang="en"] body {
            font-family: Inter, "Helvetica Neue", Arial, sans-serif;
        }

        html[data-lang="en"] .menu-item {
            font-size: 13px;
        }

        html[data-lang="en"] .level-3 > .menu-li > .menu-item,
        html[data-lang="en"] .level-4 > .menu-li > .menu-item {
            font-size: 12px;
        }
    </style>
</head>

                    <div class="avatar"><img src="https://ui-avatars.com/api/?name=W&background=e4e7ed&color=606266" alt="Avatar"></div>
                </div>
            </header>

            <div class="dashboard">
                <div class="page-title">
                    <div>
                        <h2 data-i18n="pageTitle">菜单优化（方案二）</h2>
                        <span class="subtitle" data-i18n="pageSubtitle">基于 Excel 生成的中英双语后台菜单演示</span>
                    </div>
                    <div class="source-pill"><i class="ph ph-table"></i><span data-i18n="sourceText">来源：菜单优化（方案二）.xlsx</span></div>
                </div>

                <section class="dashboard-section overview-grid">
                    <div class="overview-card">
                        <div class="eyebrow" data-i18n="groupLabel">一级分类</div>
                        <strong id="group-count">--</strong>
                        <span data-i18n="groupDesc">方案二保留清晰的顶层业务分组。</span>
                    </div>
                    <div class="overview-card">
                        <div class="eyebrow" data-i18n="nodeLabel">菜单节点</div>
                        <strong id="node-count">--</strong>
                        <span data-i18n="nodeDesc">展示 Excel 中全部中文菜单节点。</span>
                    </div>
                    <div class="overview-card">
                        <div class="eyebrow" data-i18n="leafLabel">末级入口</div>
                        <strong id="leaf-count">--</strong>
                        <span data-i18n="leafDesc">可直接点击选中的菜单入口数量。</span>
                    </div>
                    <div class="overview-card">
                        <div class="eyebrow" data-i18n="depthLabel">最大层级</div>
                        <strong id="depth-count">--</strong>
                        <span data-i18n="depthDesc">当前菜单树的最深层级。</span>
                    </div>
                </section>

                <section class="dashboard-section content-grid">
                    <div class="panel">
                        <div class="panel-title">
                            <h3 data-i18n="topPathTitle">方案二主路径</h3>
                            <i class="ph ph-tree-structure"></i>
                        </div>
                        <ul class="path-list" id="top-path-list"></ul>
                    </div>

                    <div class="panel">
                        <div class="panel-title">
                            <h3 data-i18n="coverageTitle">双语覆盖</h3>
                            <i class="ph ph-translate"></i>
                        </div>
                        <div class="coverage-list">
                            <div class="coverage-row">
                                <span data-i18n="translatedLabel">已有英文</span>
                                <div class="coverage-track"><div class="coverage-bar" id="translated-bar"></div></div>
                                <strong id="translated-count">--</strong>
                            </div>
                            <div class="coverage-row">
                                <span data-i18n="fallbackLabel">中文回退</span>
                                <div class="coverage-track"><div class="coverage-bar" id="fallback-bar"></div></div>
                                <strong id="fallback-count">--</strong>
                            </div>
                        </div>
                        <p class="hint-text" data-i18n="coverageHint">英文列为空的菜单会在英文视图中继续显示中文，避免入口缺失。</p>
                    </div>
                </section>
            </div>
        </main>
    </div>

        let currentLang = localStorage.getItem('plan2-menu-language') || 'zh';
        let searchTerm = '';

        function escapeAttr(value) {
            return String(value).replace(/[&<>"']/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function getTitle(item, lang = currentLang) {
            return item[lang] || item.zh || item.en || '';
        }

        function getIconClass(item, level) {
            const title = `${item.zh || ''} ${item.en || ''}`.toLowerCase();
            if (level === 1) return 'ph-squares-four';
            if (title.includes('首页') || title.includes('home')) return 'ph-house';
            if (title.includes('安全') || title.includes('security')) return 'ph-shield-check';
            if (title.includes('企业') || title.includes('company') || title.includes('基础') || title.includes('basic')) return 'ph-buildings';
            if (title.includes('组织') || title.includes('员工') || title.includes('user') || title.includes('employee')) return 'ph-users';
            if (title.includes('权限') || title.includes('角色') || title.includes('role') || title.includes('permission')) return 'ph-user-circle-gear';
            if (title.includes('语言') || title.includes('翻译') || title.includes('language') || title.includes('translation')) return 'ph-globe';
            if (title.includes('互联') || title.includes('external') || title.includes('portal')) return 'ph-plugs-connected';
            if (title.includes('应用') || title.includes('app')) return 'ph-app-window';
            if (title.includes('agent') || title.includes('ai') || title.includes('模型') || title.includes('助理')) return 'ph-robot';
            if (title.includes('日志') || title.includes('log') || title.includes('公告')) return 'ph-file-text';
            if (title.includes('审批') || title.includes('流程') || title.includes('flow') || title.includes('process')) return 'ph-git-branch';
            if (title.includes('数据') || title.includes('对象') || title.includes('data') || title.includes('object')) return 'ph-cube';
            if (title.includes('平台') || title.includes('服务号') || title.includes('wechat')) return 'ph-chat-circle';
            if (title.includes('设置') || title.includes('配置') || title.includes('管理') || title.includes('setting') || title.includes('manage')) return 'ph-wrench';
            return 'ph-folder';
        }

        function nodeMatches(item, term) {
            if (!term) return true;
            const haystack = `${item.zh || ''} ${item.en || ''}`.toLowerCase();
            return haystack.includes(term);
        }

        function filterTree(items, term) {
            if (!term) return items;
            return items.reduce((acc, item) => {
                const children = item.children ? filterTree(item.children, term) : [];
                if (nodeMatches(item, term) || children.length) {
                    acc.push({ ...item, children });
                }
                return acc;
            }, []);
        }

        function renderMenu(items, level = 1) {
            if (!items || items.length === 0) {
                return `<div class="${searchTerm ? 'no-results' : 'menu-empty'}">${i18n[currentLang][searchTerm ? 'noResults' : 'empty']}</div>`;
            }

            if (level === 1) {
                return `
                    <ul class="menu-list level-1">
                        ${items.map((group) => {
                            const hasChildren = group.children && group.children.length > 0;
                            const title = escapeAttr(getTitle(group));
                            const originalTitle = escapeAttr(group.zh || group.en || '');
                            const iconClass = getIconClass(group, level);
                            const chevron = hasChildren ? '<i class="ph ph-caret-right chevron"></i>' : '';
                            const expandedClass = searchTerm && hasChildren ? ' expanded-item' : '';
                            const submenuClass = searchTerm && hasChildren ? ' expanded' : '';
                            return `
                                <li class="menu-li">
                                    <div class="menu-item${expandedClass} ${hasChildren ? 'has-children' : ''}" onclick="toggleMenu(this)" data-title="${originalTitle}">
                                        <i class="ph ${iconClass}"></i>
                                        <span class="menu-text" title="${title}">${title}</span>
                                        ${chevron}
                                    </div>
                                    ${hasChildren ? `
                                        <div class="menu-submenu${submenuClass}">
                                            <div class="menu-submenu-inner">
                                                ${renderMenu(group.children, 2)}
                                            </div>
                                        </div>
                                    ` : ''}
                                </li>
                            `;
                        }).join('')}
                    </ul>
                `;
            }

            return `
                <ul class="menu-list level-${level}">
                    ${items.map((item) => {
                        const hasChildren = item.children && item.children.length > 0;
                        const title = escapeAttr(getTitle(item));
                        const originalTitle = escapeAttr(item.zh || item.en || '');
                        const iconClass = level === 2 ? getIconClass(item, level) : 'ph-circle list-dot';
                        const chevron = hasChildren ? '<i class="ph ph-caret-right chevron"></i>' : '';
                        const expandedClass = searchTerm && hasChildren ? ' expanded-item' : '';
                        const submenuClass = searchTerm && hasChildren ? ' expanded' : '';
                        return `
                            <li class="menu-li">
                                <div class="menu-item${expandedClass} ${hasChildren ? 'has-children' : ''}" onclick="toggleMenu(this)" data-title="${originalTitle}">
                                    <i class="ph ${iconClass}"></i>
                                    <span class="menu-text" title="${title}">${title}</span>
                                    ${chevron}
                                </div>
                                ${hasChildren ? `
                                    <div class="menu-submenu${submenuClass}">
                                        <div class="menu-submenu-inner">
                                            ${renderMenu(item.children, level + 1)}
                                        </div>
                                    </div>
                                ` : ''}
                            </li>
                        `;
                    }).join('')}
                </ul>
            `;
        }

        function toggleMenu(element) {
            const hasChildren = element.classList.contains('has-children');
            if (hasChildren) {
                element.classList.toggle('expanded-item');
                const submenu = element.nextElementSibling;
                if (submenu) submenu.classList.toggle('expanded');
                return;
            }

            document.querySelectorAll('#dynamic-menu .menu-item').forEach((item) => item.classList.remove('active'));
            element.classList.add('active');
        }

        function renderTopPaths() {
            const list = document.getElementById('top-path-list');
            list.innerHTML = plan2MenuData.map((item) => `
                <li title="${escapeAttr(getTitle(item))}">
                    <i class="ph ph-check-circle"></i>
                    <span>${escapeAttr(getTitle(item))}</span>
                </li>
            `).join('');
        }

        function applyLanguage() {
            const copy = i18n[currentLang];
            document.documentElement.lang = copy.htmlLang;
            document.documentElement.dataset.lang = currentLang;
            document.querySelectorAll('[data-i18n]').forEach((node) => {
                const key = node.dataset.i18n;
                if (copy[key]) node.innerHTML = copy[key];
            });
            document.getElementById('language-label').textContent = copy.languageLabel;
            document.getElementById('language-toggle').setAttribute('aria-label', copy.languageAria);
            document.getElementById('menu-search').placeholder = copy.searchPlaceholder;
            document.title = copy.pageTitle;
            renderAll();
        }

        function renderAll() {
            const filtered = filterTree(plan2MenuData, searchTerm);
            document.getElementById('dynamic-menu').innerHTML = renderMenu(filtered);
            renderTopPaths();
        }

        function fillStats() {
            document.getElementById('group-count').textContent = plan2Meta.groupCount;
            document.getElementById('node-count').textContent = plan2Meta.nodeCount;
            document.getElementById('leaf-count').textContent = plan2Meta.leafCount;
            document.getElementById('depth-count').textContent = plan2Meta.maxDepth;
            document.getElementById('translated-count').textContent = plan2Meta.translatedCount;
            document.getElementById('fallback-count').textContent = plan2Meta.fallbackCount;
            const total = Math.max(plan2Meta.nodeCount, 1);
            document.getElementById('translated-bar').style.width = `${Math.round(plan2Meta.translatedCount / total * 100)}%`;
            document.getElementById('fallback-bar').style.width = `${Math.round(plan2Meta.fallbackCount / total * 100)}%`;
            document.getElementById('fallback-bar').style.background = 'linear-gradient(90deg, #ff8300 0%, #e6a23c 100%)';
        }

        document.getElementById('language-toggle').addEventListener('click', () => {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('plan2-menu-language', currentLang);
            applyLanguage();
        });

        document.getElementById('menu-search').addEventListener('input', (event) => {
            searchTerm = event.target.value.trim().toLowerCase();
            renderAll();
        });

        fillStats();
        applyLanguage();
    </script>
